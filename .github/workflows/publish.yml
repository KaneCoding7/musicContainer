name: Publish images

# Builds the backend + frontend images and pushes them to Docker Hub.
#   - push to main  -> tag :latest  (the images others pull to run the app)
#   - pull request  -> tag :dev     (a rolling preview build to test before merge)
#
# Requires two repo secrets (Settings -> Secrets and variables -> Actions):
#   DOCKERHUB_USERNAME  = mrkane7
#   DOCKERHUB_TOKEN     = a Docker Hub access token (Account Settings -> Personal
#                         access tokens -> Generate, with Read & Write scope)

on:
  push:
    branches: [main]
  pull_request:

# A newer push/PR update cancels an in-flight build for the same ref.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    # Skip publishing for PRs opened from forks: they don't have access to the
    # Docker Hub secrets, so the push would fail. Same-repo PRs still publish :dev.
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
            image: mrkane7/music-backend
          - service: frontend
            context: ./frontend
            image: mrkane7/music-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,enable={{is_default_branch}}
            type=raw,value=dev,enable=${{ github.event_name == 'pull_request' }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
