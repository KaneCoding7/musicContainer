services:
  backend:
    build: ./backend
    container_name: music-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATA_DIR=/data
      # Auth (Better Auth). REQUIRED: a strong (>=32 char) random secret. The
      # server refuses to start in production without it. Set it in a .env file
      # next to this compose file (see .env.example) or your shell environment;
      # generate one with: openssl rand -base64 48
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET (e.g. `openssl rand -base64 48`)}
      # Public URL of the API (used by Better Auth).
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3001}
      # Origin the browser loads the frontend from (CORS + auth CSRF).
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:3000}
      # Set to "true" to require an invite code to register (owner exempt).
      - INVITE_ONLY=${INVITE_ONLY:-false}
    volumes:
      - ./data:/data

  frontend:
    build: ./frontend
    container_name: music-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      # Browser-facing URL of the backend API.
      # For Cloudflare Tunnel, point this at your public API hostname.
      - PUBLIC_API_BASE_URL=${PUBLIC_API_BASE_URL:-http://localhost:3001}
    depends_on:
      - backend
