services:
  backend:
    build: ./backend
    container_name: music-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATA_DIR=/data
      # Auth (Better Auth). CHANGE the secret for any real deployment.
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-dev-secret-change-me-in-production}
      - BETTER_AUTH_URL=http://localhost:3001
      # Origin the browser loads the frontend from (CORS + auth CSRF).
      - FRONTEND_ORIGIN=http://localhost:3000
    volumes:
      - ./data:/data

  frontend:
    build: ./frontend
    container_name: music-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      # Browser-facing URL of the backend API.
      # For Cloudflare Tunnel, point this at your public API hostname.
      - PUBLIC_API_BASE_URL=http://localhost:3001
    depends_on:
      - backend
