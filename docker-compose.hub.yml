# Run the published images from Docker Hub — no source checkout or build needed.
#
#   1. Create a .env file next to this one with at least BETTER_AUTH_SECRET set:
#        echo "BETTER_AUTH_SECRET=$(openssl rand -base64 48)" > .env
#   2. Pull + start:
#        docker compose -f docker-compose.hub.yml up -d
#   3. Open http://localhost:3000  (the first account you register becomes owner).
#
# Use a specific version instead of :latest by setting TAG, e.g.  TAG=dev  to try
# the latest PR build, or  TAG=sha-abc1234  to pin an exact commit.
services:
  backend:
    image: mrkane7/music-backend:${TAG:-latest}
    container_name: music-backend
    restart: unless-stopped
    pull_policy: always
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATA_DIR=/data
      # REQUIRED: strong (>=32 char) random secret; the API refuses to start
      # without it. Generate one with: openssl rand -base64 48
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET (e.g. `openssl rand -base64 48`)}
      # Public URL of the API (used by Better Auth).
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3001}
      # Origin the browser loads the frontend from (CORS + auth CSRF).
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:3000}
      # Set to "true" to require an invite code to register (owner exempt).
      - INVITE_ONLY=${INVITE_ONLY:-false}
    volumes:
      - ./data:/data

  frontend:
    image: mrkane7/music-frontend:${TAG:-latest}
    container_name: music-frontend
    restart: unless-stopped
    pull_policy: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      # Browser-facing URL of the backend API.
      # For Cloudflare Tunnel, point this at your public API hostname.
      - PUBLIC_API_BASE_URL=${PUBLIC_API_BASE_URL:-http://localhost:3001}
    depends_on:
      - backend
