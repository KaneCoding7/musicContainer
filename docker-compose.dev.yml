# Dev override: live hot-reload. Use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#
# Source is bind-mounted into each container and run in watch mode, so edits on
# the host are reflected immediately with no image rebuild. The anonymous
# `/app/node_modules` volume keeps the image's installed deps from being hidden
# by the bind mount.
services:
  backend:
    build:
      context: ./backend
      target: deps          # stage with full deps (incl. tsx) + build tools
    command: npm run dev     # tsx watch src/server.ts
    environment:
      - NODE_ENV=development
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./data:/data

  frontend:
    build:
      context: ./frontend
      target: build          # stage with full deps (incl. vite)
    command: npm run dev -- --host 0.0.0.0 --port 3000
    environment:
      - NODE_ENV=development
      # Comma-separated public hostnames allowed to reach the Vite dev server
      # (e.g. your Cloudflare tunnel hostname). Set in .env.
      - VITE_ALLOWED_HOSTS=${VITE_ALLOWED_HOSTS:-}
    volumes:
      - ./frontend:/app
      - /app/node_modules
